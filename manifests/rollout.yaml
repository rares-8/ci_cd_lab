apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/rares-8/go-simple-webserver@sha256:e4b8a2fc82cc3e69c07298ea3a52e8049a3375e5e3213ceba299abcc989ec65c
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
